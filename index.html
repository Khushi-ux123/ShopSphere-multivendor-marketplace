<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopSphere | Premium Multi-Vendor Generational Marketplace</title>
    
    <!-- Primary SEO Meta Tags -->
    <meta name="description" content="ShopSphere is a curated multi-vendor e-commerce marketplace offering premium consumer electronics, custom artisan woodwork, organic health & beauty skincare, and cozy comfort crafts." />
    <meta name="keywords" content="e-commerce, multi-vendor marketplace, online shopping, handcrafted creations, community artisans, premium electronics, generational products, custom woodwork, skincare, ShopSphere" />
    <meta name="author" content="ShopSphere Corporation" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shopsphere.marketplace.com" />
    <meta property="og:title" content="ShopSphere | Premium Multi-Vendor Generational Marketplace" />
    <meta property="og:description" content="Discover handcrafted luxury items, premium electronics, and wellness products built to bridge generational boundaries on a secure, certified escrow-protected shopping platform." />
    <meta property="og:image" content="https://shopsphere.marketplace.com/og_preview.jpg" />

    <!-- Twitter Card -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://shopsphere.marketplace.com" />
    <meta property="twitter:title" content="ShopSphere | Premium Multi-Vendor Generational Marketplace" />
    <meta property="twitter:description" content="Discover handcrafted luxury items, premium electronics, and wellness products built to bridge generational boundaries on a secure, certified escrow-protected shopping platform." />
    <meta property="twitter:image" content="https://shopsphere.marketplace.com/og_preview.jpg" />

    <!-- Schema.org JSON-LD Structured Data (Adds rich metadata search context) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "ShopSphere",
        "url": "https://shopsphere.marketplace.com",
        "description": "Multi-vendor platform presenting fine visual electronics, woodworking masterworks, organic cosmetic therapies, and tactile toys for all ages.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://shopsphere.marketplace.com/?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "ShopSphere Multi-Vendor Marketplace",
        "url": "https://shopsphere.marketplace.com",
        "logo": "https://shopsphere.marketplace.com/src/components/assets/images/shopsphere_logo_1781309426828.jpg",
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+1-800-555-0199",
          "contactType": "customer service"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
